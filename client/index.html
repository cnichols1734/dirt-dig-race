<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DIG</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
      #game { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: manipulation; }
      #root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
      #root * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
